# 数据
data:
  data_dir: "./data"
  max_length: 128
  num_negatives: 4
  max_history: 10

# 模型
model:
  bert_model_name: "bert-base-chinese"
  embedding_dim: 768
  temperature: 0.07
  dropout: 0.1

# 训练
train:
  batch_size: 32
  epochs: 5
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  save_every: 1

# 评估
eval:
  top_k: [10, 50]
  faiss_index: "Flat"

# 其他
device: "cuda"
seed: 42
